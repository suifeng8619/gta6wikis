  <text x="200" y="265" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="50" font-weight="700" opacity="0.95">GTA ONLINE</text>
  <text x="200" y="300" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="400" opacity="0.7">Grand Theft Auto</text>
