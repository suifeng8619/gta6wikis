<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A100C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#39FF7A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect width="400" height="400" fill="url(#overlay)"/>
  <text x="200" y="190" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="50" font-weight="700" opacity="0.95">Flash Fm</text>
  <text x="200" y="225" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="400" opacity="0.7">Radio Station</text>
</svg>