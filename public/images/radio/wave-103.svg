<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5E4D"/>
      <stop offset="100%" style="stop-color:#39FF7A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg)"/>
  <circle cx="150" cy="150" r="120" fill="url(#glow)"/>
  <rect x="0" y="0" width="300" height="300" fill="#1A100C" opacity="0.4"/>
  <text x="150" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">WAVE 103</text>
  <text x="150" y="165" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" opacity="0.6">New Wave / Synth</text>
  <line x1="100" y1="185" x2="200" y2="185" stroke="#FF5E4D" stroke-width="2" opacity="0.5"/>
  <text x="150" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" opacity="0.3">VICE CITY RADIO</text>
</svg>
